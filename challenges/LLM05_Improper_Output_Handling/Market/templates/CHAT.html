{% extends "base.html" %}
{% block body %}
<div class="lab-main">
  <div class="container">
    <h1>AI Assistant</h1>
    <p class="subtitle">Ask the assistant about your account, budget, or available items.</p>

    <div class="chat-container">
      <div class="chat-header">💬 E-Commerce Assistant</div>
      <div class="chat-box" id="chat-box"></div>
      <div id="typing" class="typing-message" style="display:none;padding:10px 14px;">
        🤖 AI is thinking<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
      </div>
      <div class="input-container">
        <input type="text" id="user-input" placeholder="Type your message…">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
  function sendMessage() {
    const userInput = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');
    if (!userInput.value.trim()) return;

    document.getElementById('typing').style.display = 'block';
    chatBox.innerHTML += `<pre class="message user-message">${userInput.value}</pre>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    fetch('/chat', {
      method: 'POST',
      body: JSON.stringify({message: userInput.value}),
      headers: {'Content-Type': 'application/json'}
    })
    .then(r => r.json())
    .then(data => {
      chatBox.innerHTML += `<pre class="message bot-message">${data.reply}</pre>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      document.getElementById('typing').style.display = 'none';
    });

    userInput.value = '';
  }

  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });
</script>
{% endblock %}
