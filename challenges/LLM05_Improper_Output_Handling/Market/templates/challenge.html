<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM05: Improper Output Handling</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="lab-header">
  <span class="lab-badge">LLM05</span>
  <h1>{{ vuln.title }} — CTF Challenge</h1>
  <a href="/" class="back-link">← Home</a>
</header>

<main class="lab-main">
  <div class="container">
    <p class="subtitle">Solve this challenge by bypassing security measures.</p>

    <div class="chat-container">
      <div class="chat-header">💬 OWASP CTF Chat</div>
      <div class="chat-box" id="chat-box"></div>
      <div id="typing" class="typing-message" style="display:none;padding:10px 14px;">
        🤖 AI is thinking<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
      </div>
      <div class="input-container">
        <input type="text" id="user-input" placeholder="Type your message…">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</main>

<script>
  function sendMessage() {
    const userInput = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');
    if (!userInput.value.trim()) return;

    document.getElementById('typing').style.display = 'block';
    chatBox.innerHTML += `<pre class="message user-message">${userInput.value}</pre>`;

    fetch('/chat', {
      method: 'POST',
      body: JSON.stringify({message: userInput.value}),
      headers: {'Content-Type': 'application/json'}
    })
    .then(r => r.json())
    .then(data => {
      chatBox.innerHTML += `<pre class="message bot-message">${data.reply}</pre>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      document.getElementById('typing').style.display = 'none';
    });

    userInput.value = '';
  }
</script>
</body>
</html>
