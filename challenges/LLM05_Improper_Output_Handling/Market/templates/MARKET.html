{% extends "base.html" %}
{% block body %}
<div class="market-wrapper">
  <h1 style="margin-bottom:1.5rem;">Available Items</h1>
  <table class="market-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Barcode</th>
        <th>Price</th>
        <th>Description</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for item in items %}
        {% include 'modals/items.html' %}
        <tr>
          <td>{{ item.name }}</td>
          <td>{{ item.barcode }}</td>
          <td>{{ item.prettier_price }}</td>
          <td>{{ item.description }}</td>
          <td>
            <button class="btn btn-secondary btn-sm" onclick="openModal('modal-info-{{ item.id }}')">Info</button>
            <button class="btn btn-success btn-sm" onclick="openModal('modal-buy-{{ item.id }}')">Buy</button>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<script>
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
  });
</script>
{% endblock %}
