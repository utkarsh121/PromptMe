<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM04: Data & Model Poisoning</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="lab-header">
  <span class="lab-badge">LLM04</span>
  <h1>Data & Model Poisoning</h1>
  <a href="http://127.0.0.1:5000" class="back-link">← Dashboard</a>
</header>

<main class="lab-main">
  <div class="container">
    <p class="subtitle">An LLM chatbot that answers questions about OWASP LLM Top 10 vulnerabilities using a CSV knowledge base.</p>
    <p class="lab-goal"><strong>Goal:</strong> Poison the knowledge base so LLM01 is no longer listed as Prompt Injection.</p>

    <form id="questionForm">
      <div class="form-group">
        <label for="question">Ask a question</label>
        <input type="text" id="question" name="question" placeholder="e.g. List top 10 LLM Vulnerabilities" required>
      </div>
      <button type="submit">Submit</button>
    </form>

    <div id="loading" class="loading" style="display:none;">⏳ Fetching answer…</div>
    <div id="answer" class="answer-section" style="display:none;"></div>

    <button id="reload-btn">Reload Knowledge Base</button>
    <p id="reload-status"></p>
  </div>
</main>

<script>
  document.getElementById('questionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const q = document.getElementById('question').value;
    const answerDiv = document.getElementById('answer');
    const loadingDiv = document.getElementById('loading');

    loadingDiv.style.display = 'block';
    answerDiv.style.display = 'none';
    answerDiv.innerHTML = '';

    try {
      const resp = await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question: q})
      });
      const result = await resp.json();
      answerDiv.style.display = 'block';
      if (resp.ok) {
        typeText(answerDiv, result.answer);
      } else {
        answerDiv.innerHTML = `<strong>Error:</strong> ${result.error}`;
      }
    } catch {
      answerDiv.style.display = 'block';
      answerDiv.innerHTML = 'Something went wrong. Please try again.';
    } finally {
      loadingDiv.style.display = 'none';
    }
  });

  function typeText(el, text, speed=25) {
    el.innerHTML = '';
    let i = 0;
    (function type() {
      if (i < text.length) { el.innerHTML += text.charAt(i++); el.scrollTop = el.scrollHeight; setTimeout(type, speed); }
    })();
  }

  document.getElementById('reload-btn').addEventListener('click', async () => {
    const status = document.getElementById('reload-status');
    status.textContent = 'Reloading…';
    try {
      const res = await fetch('/reload', {method: 'POST'});
      const data = await res.json();
      status.textContent = res.ok ? data.message : (data.error || 'Reload failed');
    } catch {
      status.textContent = '❌ Error during reload';
    }
  });
</script>
</body>
</html>
