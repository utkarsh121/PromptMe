<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM03: Supply Chain</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="{{ url_for('static', filename='chat.js') }}" defer></script>
</head>
<body>

<header class="lab-header">
  <span class="lab-badge">LLM03</span>
  <h1>Supply Chain Risk</h1>
  <a href="http://127.0.0.1:5000" class="back-link">← Dashboard</a>
</header>

<main class="lab-main">
  <div class="container">
    <p class="subtitle">A compromised "custom" model silently exfiltrates your chat data to an attacker-controlled server.</p>
    <p class="lab-goal"><strong>Goal:</strong> Identify the suspicious component in the AI supply chain.</p>

    <div class="prelab-bar">
      <button class="btn-cleanup" onclick="preLabCleanup()">⚙ Pre-lab Cleanup</button>
      <span id="cleanup-status" class="cleanup-status"></span>
    </div>

    <div class="form-group">
      <label for="model-select">Choose a model</label>
      <select id="model-select">
        <option value="" disabled selected>Select a model…</option>
      </select>
    </div>
    <button onclick="initModel()">Start Chat</button>

    <div id="loading" class="loading" style="display:none;">Initializing model…</div>

    <div id="chat-window" class="chat-window" style="display:none;">
      <div id="messages"></div>
      <div class="chat-input">
        <input type="text" id="prompt" placeholder="Ask about the supply chain…">
        <button onclick="sendMessage()" style="width:auto;">Send</button>
      </div>
    </div>

    <div class="monitors">
      <div class="monitor-panel">
        <div class="monitor-header">
          <span>📡 Exfil Monitor</span>
          <span id="exfil-dot" class="dot-indicator dot-idle"></span>
        </div>
        <pre id="exfil-output" class="monitor-output">Waiting for data…</pre>
      </div>
      <div class="monitor-panel">
        <div class="monitor-header">
          <span>🚩 Flag Server</span>
          <span id="flag-dot" class="dot-indicator dot-idle"></span>
        </div>
        <pre id="flag-output" class="monitor-output">Waiting…</pre>
      </div>
    </div>
  </div>
</main>

</body>
</html>
