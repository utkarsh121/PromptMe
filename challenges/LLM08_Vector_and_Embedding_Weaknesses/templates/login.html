<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM08: Admin Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="lab-header">
  <span class="lab-badge">LLM08</span>
  <h1>Admin Login</h1>
  <a href="{{ url_for('landing') }}" class="back-link">← Home</a>
</header>

<main class="lab-main" style="max-width:420px;margin:2rem auto;">
  <div class="container">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input name="username" placeholder="Username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input name="password" type="password" placeholder="Password" required>
      </div>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for msg in messages %}
            <div class="error-box">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <button type="submit" style="margin-top:0.75rem;">Login</button>
    </form>

    <div style="margin-top:1rem;text-align:center;font-size:0.85rem;">
      <a href="{{ url_for('ask') }}" class="nav-back">Ask the LLM</a>
    </div>
  </div>
</main>

</body>
</html>
