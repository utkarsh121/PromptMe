<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM08: Admin — Inject Data</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="lab-header">
  <span class="lab-badge">LLM08</span>
  <h1>Admin — Inject to Vector Store</h1>
  <a href="{{ url_for('ask') }}" class="back-link">← Ask LLM</a>
</header>

<main class="lab-main">
  <div class="container">
    <form method="POST">
      <div class="form-group">
        <label>Document content</label>
        <textarea name="doc_content" rows="8" placeholder="Paste Markdown, YAML, or plain text to inject…"></textarea>
      </div>
      <button type="submit">Inject Document</button>

      {% if message %}
      <div class="success" style="margin-top:1rem;">{{ message }}</div>
      {% endif %}
    </form>

    {% if session.get('admin') %}
    <div class="admin-section">
      <h3 class="section-title">Admin Actions</h3>
      <form method="post" action="{{ url_for('clear_vector_store_route') }}">
        <button type="submit" class="btn-danger">❌ Clear Vector Store</button>
      </form>
    </div>
    {% endif %}

    <div style="margin-top:1rem;font-size:0.85rem;">
      <a href="{{ url_for('logout') }}" class="logout-link">Logout</a>
    </div>
  </div>
</main>

</body>
</html>
