<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM08: Query LLM</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="lab-header">
  <span class="lab-badge">LLM08</span>
  <h1>Query the LLM</h1>
  <a href="{{ url_for('landing') }}" class="back-link">← Home</a>
</header>

<main class="lab-main">
  <div class="container">
    <form method="POST">
      <div class="form-group">
        <label>Your question</label>
        <input type="text" name="query" placeholder="Ask a question…" required>
      </div>
      <button type="submit">Ask</button>
    </form>

    {% if llm_response %}
    <div style="margin-top:1.5rem;">
      <label>Response</label>
      <textarea class="llm-output" readonly id="llm-output"></textarea>
    </div>
    {% endif %}

    <div style="margin-top:1rem;font-size:0.85rem;">
      <a href="{{ url_for('login') }}" class="nav-back">Admin Panel</a>
    </div>
  </div>
</main>

{% if llm_response %}
<script>
  const fullText = {{ llm_response | tojson }};
  const output = document.getElementById('llm-output');
  let i = 0;
  const iv = setInterval(() => {
    output.value += fullText.charAt(i++);
    if (i >= fullText.length) clearInterval(iv);
  }, 20);
</script>
{% endif %}

</body>
</html>
