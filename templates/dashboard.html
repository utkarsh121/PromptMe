<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OWASP LLM Top 10 Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>

  <!-- Ollama Status Panel -->
  <div class="ollama-panel" id="ollamaPanel">
    <div class="ollama-header">
      <span class="ollama-dot" id="ollamaDot"></span>
      <span class="ollama-title">Ollama</span>
      <span class="ollama-status-text" id="ollamaStatusText">checking...</span>
    </div>
    <div class="ollama-models" id="ollamaModels"></div>
  </div>

  <h1>PromptMe</h1>
  <h3>OWASP LLM Top 10 CTF Challenges</h3>
  <div class="tiles-container">
    {% for risk in risks %}
      <div class="tile" id="tile-{{ risk.id }}">
        <div class="running-status" id="status-{{ risk.id }}">Running</div>
        <i class="{{ risk.icon }}" style="font-size: 36px;"></i>
        <h3>{{ risk.title }}</h3>
        <div class="tile-buttons">
          <button class="tile-button start" onclick="startChallenge({{ risk.id }})">Start</button>
          <button class="tile-button stop" onclick="stopChallenge({{ risk.id }})">Stop</button>
        </div>
      </div>
    {% endfor %}
  </div>

  <script>
    function startChallenge(challengeId) {
      window.open(`/start/${challengeId}`, '_blank');
      document.getElementById(`status-${challengeId}`).style.display = 'block';
    }

    function stopChallenge(challengeId) {
      fetch(`/stop/${challengeId}`)
        .then(response => response.text())
        .then(alert);

      document.getElementById(`status-${challengeId}`).style.display = 'none';
    }

    function formatSize(bytes) {
      if (!bytes) return '';
      const gb = bytes / 1e9;
      return gb >= 1 ? `${gb.toFixed(1)} GB` : `${(bytes / 1e6).toFixed(0)} MB`;
    }

    function refreshOllama() {
      fetch('/ollama/status')
        .then(r => r.json())
        .then(data => {
          const dot = document.getElementById('ollamaDot');
          const statusText = document.getElementById('ollamaStatusText');
          const modelsDiv = document.getElementById('ollamaModels');

          if (data.running) {
            dot.className = 'ollama-dot online';
            statusText.textContent = `${data.pulled.length} model${data.pulled.length !== 1 ? 's' : ''} pulled`;
          } else {
            dot.className = 'ollama-dot offline';
            statusText.textContent = 'not running';
            modelsDiv.innerHTML = '';
            return;
          }

          modelsDiv.innerHTML = data.pulled.map(m => {
            const isLoaded = data.loaded_names.includes(m.name);
            const sizeStr = formatSize(m.size);
            const badge = isLoaded
              ? `<span class="model-badge loaded">Loaded</span>`
              : `<span class="model-badge idle">Idle</span>`;
            const btn = isLoaded
              ? `<button class="model-btn unload" onclick="unloadModel('${m.name}')">Unload</button>`
              : `<button class="model-btn load" onclick="loadModel('${m.name}')">Load</button>`;
            return `<div class="model-row">
              <span class="model-name">${m.name}</span>
              <span class="model-size">${sizeStr}</span>
              ${badge}${btn}
            </div>`;
          }).join('');
        })
        .catch(() => {
          document.getElementById('ollamaDot').className = 'ollama-dot offline';
          document.getElementById('ollamaStatusText').textContent = 'not running';
          document.getElementById('ollamaModels').innerHTML = '';
        });
    }

    function unloadModel(name) {
      fetch(`/ollama/unload/${name}`, { method: 'POST' })
        .then(() => refreshOllama());
    }

    function loadModel(name) {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Loading…';
      fetch(`/ollama/load/${name}`, { method: 'POST' })
        .then(() => refreshOllama());
    }

    refreshOllama();
    setInterval(refreshOllama, 20000);
  </script>
</body>
</html>
